name: Angular CI

on:
  pull_request:
    branches: [ master, develop ]
  push:
    branches: [ master, develop ]

jobs:

  # -------------------------
  # 1️⃣ PR TITLE VALIDATION
  # -------------------------
  pr-title-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Validate PR Title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | grep -E "^(feat|fix|chore|docs|refactor|test): .+" || exit 1


  # -------------------------
  # 2️⃣ SECURITY JOB
  # Runs only if PR title succeeds
  # -------------------------
  security-scan:
    runs-on: ubuntu-latest
    needs: pr-title-check
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && needs.pr-title-check.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Semgrep
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      # Trivy
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      # File Header Scan
      - name: License Header Check
        run: |
          ! grep -L "Copyright 2026" $(find src -name "*.ts")


  # -------------------------
  # 3️⃣ TEST + SONAR JOB
  # Runs in parallel with security job
  # -------------------------
  test-and-sonar:
    runs-on: ubuntu-latest
    needs: pr-title-check
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && needs.pr-title-check.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - uses: browser-actions/setup-chrome@v1

      - name: Run Unit Tests
        run: |
          export CHROME_BIN=$(which google-chrome)
          npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless

      - name: Sonar Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}