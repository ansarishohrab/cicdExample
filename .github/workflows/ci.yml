name: Angular CI

on:
  pull_request:
    branches: [ master, develop ]
  push:
    branches: [ master, develop ]

jobs:

  # 1️⃣ PR TITLE VALIDATION (always runs)
  pr-title-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR Title (only on PR)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | grep -E "^(feat|fix|chore|docs|refactor|test): .+" || exit 1

      - name: Skip on push
        if: github.event_name == 'push'
        run: echo "Push event — skipping PR title validation"


  # 2️⃣ SECURITY JOB
  security-scan:
    runs-on: ubuntu-latest
    needs: pr-title-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      - name: License Header Check
        run: |
          FAIL=0
          for file in $(find src -name "*.ts"); do
            if ! grep -q "Copyright 2026" "$file"; then
              echo "Missing header in $file"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo "License header check failed."
            exit 1
          fi

          echo "License header check passed."


  # 3️⃣ TEST + SONAR JOB
  test-and-sonar:
    runs-on: ubuntu-latest
    needs: pr-title-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - uses: browser-actions/setup-chrome@v1

      - name: Run Unit Tests
        run: |
          export CHROME_BIN=$(which google-chrome)
          npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless

      - name: Sonar Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sonar Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}